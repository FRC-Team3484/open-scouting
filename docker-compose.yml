version: "3.8"
services:
  postgres:
    image: postgres:16
    expose:
      - "5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - /mnt/openscouting_db/postgres:/var/lib/postgresql/data

  frontend:
    image: ghcr.io/frc-team3484/open-scouting-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    env_file:
      - .env

  backend:
    image: ghcr.io/frc-team3484/open-scouting-backend:latest
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - /mnt/openscouting_db/uploads:/data/uploads

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /mnt/openscouting_db/uploads:/data/uploads:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config: