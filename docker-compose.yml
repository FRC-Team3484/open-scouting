version: "3.8"
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - /mnt/openscouting_db/postgres:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PUBLIC_FAST_API_URL: https://open-scouting-dev.nfoert.dev/api

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env.production
    depends_on:
      - postgres

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config: