services:
  web:
    build: ./scouting
    container_name: open-scouting
    command: gunicorn --workers 3 --chdir scouting scouting.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - staticfiles:/usr/src/app/staticfiles
    expose:
      - 8000
    env_file:
      - ./scouting/.env.production
    depends_on:
      - db
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - staticfiles:/usr/src/app/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres
    container_name: postgres
    volumes:
      - /mnt/db/postgres:/var/lib/postgresql/data
      - /mnt/db/backups:/backups
    env_file:
      - ./scouting/.env.production
    restart: unless-stopped

volumes:
  staticfiles:
  caddy_data:
  caddy_config:
